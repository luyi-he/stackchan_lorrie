name: Build StackChan Firmware

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # Allow manual triggers

jobs:
  build:
    name: Build StackChan
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.2
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fetch repository dependencies
        shell: bash
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          cd firmware
          python fetch_repos.py

      - name: Build firmware and merge binary
        shell: bash
        run: |
          source $IDF_PATH/export.sh
          cd firmware
          idf.py set-target esp32s3
          idf.py build
          idf.py merge-bin

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stackchan_cores3_firmware
          path: firmware/build/merged-binary.bin
          if-no-files-found: error
